body:
  text: 清和真人北遊語録序并七嘗觀南伯子葵問女偊之聞道對以聞諸副墨之子副墨之子聞諸洛誦之孫乃至瞻明聶許需役於謳逮夫玄冥參寥極於疑始也足見自非生而知之目擊道存者曷嘗不假修心鍊性漸證漸悟自日益至於日損自有為至於無為道成功就住世成仙固亦有次第矣然則修道之教忘言之言詎可已乎清和尹真人傳長春師之道嗣掌天下大教重闢玄門宣演正派如景星丹鳳爭先覩之為快也內則脫履摳衣者不下千計外則送供請事者不遠千里道價德馨被于夷夏天下翕然推尊之誠一代之宗匠也嘗赴北京運使侯進道等醮事門人集師北遊語録一編乃師資答問講論經法諄諄然以真實語指平常心提正玄綱折中妙理誠入道之筌蹄也沁郡長官杜德康將大書鋟木與四方信士林泉幽人共之遂釐為上下二卷冀覽者因言悟入同證長生顧不韙歟噫今真人退堂就間終日靜坐將與造物者遊於無何有之鄉面且不得見而況其言乎歲在强圉作鄂秋一日古陶李進書昔孔子嘗謂弟子曰豫欲無言子貢曰子如不言則小子何述焉故聖人之於道也必以言傳如或不然何以明道今清和真人尹公自幼出家從長春師父五十餘年朝參夕問未嘗少怠在衆中素號傑出者矣遂親授訓墨俾掌其教事天下尊之每於間宴之際與衆講論全真妙㫖至於終日舋舋不倦言甚簡當柝理易曉與夫談玄說妙干時惑衆者固有間矣故諸弟子恐其遺落各記所聞纂為一編目曰清和真人語録分為二卷庶使四方修真之士皆得披讀而易於入道也以力未能就嘗為歉照會銅川長官杜德康迎師南邁聞而樂之遂命工板行欲永其傳一日平遙太平興國觀提點王志寧洎李志方懇求豫為序義不敢辭抑又嘉仁人君子之用心深也聊托其實以叙其始末云時丁酉歲七月立秋日南軒老人張天祚題夫大道無象至理無言且無象之道既不可得而見其無言之理烏可得而明理何以明由言而明之然言之則不類矣故古之君子强為之言言必有宗言有宗則理為言筌而出之以是知理在言外得其理而言自忘矣故曰至理無言無言則無象矣故曰大道無象見無象之道言無言之理者非真得真知其孰能哉既可得而言矣廣說而不為之太過約說而不為之不及即能動則有法靜則會極與道玄同之謂也若人之出世亦豈易遇哉今清和真人繼踵長春綱領玄教積有歲年四方修真之士造席請益者歲無虛日久而益敬遠而益親爭先覩者不啻若景星之與鳳凰也偉哉至人平日以誠接物以慈利人不求保於人人保之其人天之真依者歟一日知宫張德方諸君捧北行所録若干卷來謁曰在長春先師之門者唯師知公最深其所託亦可謂重矣今將以是書刻梓若得公之文序之以廣諸方後學願見之心豈不美乎余竦爾而謝曰余言何足謂之文邪惟真人道純學奧當代之偉人其真得真知無間乎語默人得其一言一話録而成書者久矣又何待余言而傳德方曰不然挈裘者必以領升堂者必自階願借一言鉤深發至列之卷首庶使學者由領而舉自階而升亦非小補余不敢復辭乃筆以授之時庚子秋七月初吉嗣教真常子李志常題
