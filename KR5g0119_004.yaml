front:
  text: 清和真人北遊語録卷之四并十
  hash: sha256:5a8894620fb74cb83be694edd0b96005594d48984d198b85bc4541477b468bb2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0119_HFL_004-001a, image: hfl/1017/1017-158.png}
body:
  text: 弟子段志堅編師父嘗説徐神翁在家大孝傭賃於酒肆中三年所得工價奉養其母凡塵勞之事不擇輕重見無不為一曰有客畫鶴於門壁間神翁出觀之客回目一顧神翁遂得其傳即於稠人邊靜坐忘形至七日心開悟道若非先有博大功行何以致此以其有之故聖賢來點化畫鶴者即純陽之化身又馬自然者早年知道苦行勤修至六十四歲尚未有成一朝發憤將投河以棄其身忽遇人曰公之功行已備惟欠此一著爾遂止之果百日了道以二公觀之一無為一有為欲明無為有為之正實難分解只要功行成滿自有所得師父自言俺學道下志把握心情自內觀其心至寂無所寂地面前後百日雖鬼神至靈不能窺測然忽一念橫起自不可遏用盡智力終無可奈何此無他只是少闕功行故也若果功行周全聖賢自來提挈學者勿疑講古之善為士章終師曰所講析盡其理然未盡其用往日咸陽老王先生深通經教一日來堂下師父問即日看何書對曰華嚴經師令講其義師曰句句皆妙用惜乎能演而未能明也此章為學道之人大戒己之抱道不欲人知人知則有損如藏珠玉慢則招人窺竊兢兢猶豫如冬涉冰惟恐其失又恐人知是以若畏四鄰儼然若客無敢妄有動作此外愼也涣若冰釋敦兮若朴曠兮若谷言內性也愼其外而護其中然尚守其弊不為新成將以成其大成也故經云大器晚成今日學者或有些子光明自盈自足惟恐人不知不能固守其弊正玉陽所謂狂花也學道始則甚易得愈深則愈難見往日遠方道人欲來山東堂下未至時無有無敬心者想像堂下皆有道之士既至相見未久惟見其無甚異於人者則敬心稍衰殊不知道愈深而人愈難見此所以為深不可識師父常應人談説俗話連日不止外人初聽者無不疑訝當時大有塵勞師父一一親臨至於剝麻之事亦為之堂下人亦曰丘大翁山公嘗有疑心而問於我我對曰得道人不可於言語細事上看道性既成應俗而言雖終日言而未嘗言言既終則復其性豈非濁以久動徐清安以久靜徐生乎豈如俗人勉強説道內心不覺俗念已生學道之人異於此本志於道凡百塵勞之事隨動隨作勞而不辭己既未免日食塵勞事亦未可免此功行豈肯教人奪却然事畢一皆忘之復其學道之性若一毫不忘則禪家謂之住相止要道心重道心重則外緣雖多無不壓下如此行持自合經之大旨五千言正説反説止欲令人見道當以八十一章合為一章復以一章為一句又復以一句為一字和一字亦撇脫早回不是可道之道講致虛極章終志全復曰靜曰復命此一句終不能究其極敢問師曰經教中無有不明之理惟性命為難明往日山東李道人善談理性之妙人謂之李長老與赤腳老劉先生為道伴一日問於師曰人之性得於父邪得於母邪師父聊復答之蓋亦難言也李後至五十八歲疑心尚在遂退而還俗故知學道必須窮理然亦不可求之太過太過則正如物之藝藝矣嘗記孟先生平峪庵中養病一日出門見娠婦汲水孟揖之曰吾將死矣當託生於伊伊即我母也婦聞之驚走不數日果亡其婦生一女子頂上隱隱有冠痕即名之曰孟仙今方五歲矣又于師叔之父于官人住山東日嘗夢遊一所樓臺花卉之麗迥非人間後有一亭數仙子列坐於上奕棋一童子捧子侍立于揖拜讓令升其童子視于有眷慕意衆仙逐付于領而出乃驚寤時報內閣生子後年十五六殊不喜俗事既娶三年不與妻同處親族皆欲重責其父始曰當日之夢乃從其所好父亡遇丹陽師父出家以此觀之則人之性果得於父邪果得於母邪胎未成而入邪胎已成而入邪亦嘗有母感而生者履巨人足迹孤竹端木之類是己誠感化之自然必欲窮其因地則不可師父有云遽遽覺間想因緣間字極有意味學人雖於理上有所未明只勿有疑心但當積行纍功道在其中矣莫欺天莫虧人至誠與得道人結緣結之至深今生後世直至提挈了當師父言俺惟與祖師結緣素深昔在磻溪日至於不令食鹽未至夜半不令睡比細事亦蒙一一點檢忽一夕境中見祖師膝上坐一嬰兒約百日許覺則有悟於心知吾之道性尚淺也半年復見如前境其兒已及二歲許覺則悟吾道性漸長在後自覺無惡念一年又如前境其兒三四歲許自能行立後不復見乃知提挈直至自有所立而後已凡人能懇心學道必遇至人開發然則非有真功實行則不能遇修行人積福一分心上一分安爽一切事來皆要消息凡有大寵辱人皆難過衆所不容者已都能輕省過去及能忍納包容此之謂消得實學道之福也學人當記取此關節無以智力求之若果智力可求則強心有力者皆得成道恐無此理也講太上大道廢絶聖棄智三章云云師曰所講經教字字是妙用人必心上有此理所聞皆有契處心上先無則不能入也此三章之義本明道氣下衰聖人設教隨時自失道而後以德至於用禮皆不得不然如全真教門丹陽師父教法與長春師父甚有不同亦不得不然耳孔子以仁義禮智為教然則孔子之道又豈止於仁義禮智哉聖人懷道而不棄仁義禮智者要應一時之用應過則復於道修行人內含其真在仁為仁在義為義在禮為禮在智為智而不失其真任世下降而獨能復於古學人止要內守其真應一切之用而無所著也吾雖當此時而未嘗不守其真夢境中猶看衲衣作塵勞事化飯食凡出家不免應緣常能不忘道性必有前程此生一志於道縱復再出頭來又是一箇好道人今之出家人或有不念此理常欲在人之上惟恐失其假德外望對人則暝目拱手作坐忘態無人則無所不作雖名曰道人果道人也哉講絶學無憂章終師曰為學非難絶學為難嘗記馬禫師有十勸其四云勸君四廣學多聞心上刺情忘見盡絶馳求信手拈來無不是忘情忘見則不馳不求矣因有情故見解出不是馳騁則是貪求經云見素抱朴少私寡欲素謂素分識素分則抱朴矣私謂己私欲謂貪欲私不能無能少私則寡欲矣聖賢廣説詳説欲人知而行之奈何不知不學則終無所知而已學而知者泥於學而不行其所知皆虛度也上智不行與下愚相去何遠過猶不及正謂此也無學者不知聖經之義多惡其有學者聞絶學無憂之言則愈謂為學者非也不道不學者更不是聖人豈不欲人為學所以戒者戒其學而既知尚不能忘其學然學者或有理義難通處且當放過時下不得後或自得既知其不知即是知矣孔子曰知之為知之不知為不知是知也戒不可以強為知也經云絶學無憂者戒知而不能忘則有憂矣若云便當絶學聖人何為説五千言道人雖未能廣學隂符道德清靜三經又豈可不學講孔德之容章師曰嘗記師父問及我輩曰經教中何者最為近道山公先以伊之所得為對吾以此章對谷神不死藴奧難見此章便得用度云恍兮惚兮其中有物象存焉若行到則自可見矣道雖窈冥難見其可見者德也施之及物則為功行原其所來則實出於道顯諸仁藏諸用道德功行本是一源未有無道心而有實德者雖初地人亦能深知何人有道心何人無道心凡一切美惡自然呈現故指而言之曰以此言以此可見非為難也又云其中有精其精甚真此一言為亘古及今不去以此至精化生人物是故學道不敢起絲毫塵心惟恐精神散失禪家有一説一婦人乘車過門一僧偶見之佇目凝視其車遂增重蓋其精神已被車載得去也玉陽大師有言更親切云著物太深者至滅其性師父亦曾説人尸上實精英棺槨多年化為魍魎豈不是有光明邪故知人之光明隨物分了且如一碗水騰倒於百碗中碗碗不能瀝盡皆帶餘濕其元水已盡矣人之光明不可散失光明大則性大光明小則性小以此光明照察他人真偽無遺還能回光自照則光明都在於己惟有志之士能把握不至散失雖然不得真功實行相配則不能變化有人曾問道於師父答曰外修隂德內固精神故知雖有精神不得功行終不可成道然有功德於人或及物無得有恃賴之心師父有詩云莫問天機事怎生惟修隂德念長更人情反覆皆仙道日用操持盡力行若有一毫恃賴則謂之住相功德小却又知無為有為本無定體無為有所恃著即有為也雖有為無所恃著即無為也又何嘗有定體哉師曰人多將自己光明照他人之過無毫髮遺貸還能返照於己則不復敢見人之過師父每見人過欲加教訓而必先言曰彼此衆生性然後方言其過其意謂彼與我皆有衆生性我先覺者是以先覺覺後覺也其教人之道曲盡如此於中下人則明明指教但於有靈識者則聊舉其意而聽其自悟吾從師以來體其動靜語默無不是教惟顧其學者如何耳果能體究盡心則日自有進今之學者惟當自照不可察人之過如此行持漸自有得師曰吾聞行教須用權以方便化人是也然則不無失其實常體師父所言無一不本於實常曰吾心知方便而口不能道吾亦曾與完顔先生論及此初則是説方便久則習慣於口化為常言不自知覺其心亦與之俱化此當為學者深戒師曰學道只在一念之間一念舉則為進一念踈則為退進進不已方是學道且如百工為技或幹用諸事必待安排布置然後可為惟學道不待安排布置只是澄心置欲逐時處處皆做得不以行住坐卧時寒時暑與人同居或獨居無所不可學人當下承當如前輩得一言則行持一言往往有所持者云某時下手某時理會日復一日志氣漸衰終無所成講跂者不立有物混成二章終師曰天下有自然之理人多不知知者必不為不自然之事事有真妄甚不可不明未達者以妄笑妄終不自知其為妄學道之人心性中先知真妄或有得處未得處以經為證是以經配性心與經合則終身不妄玉陽大師初不讀書出言合經得其本故也今人有深解經文而不知其本者執著古人言語反成迷惑不道古人言語是無言之言若只得其語言之妙自己性上不得妙用全不濟事學道至識心見性得真空才是要盡力行持玉陽大師有云自從得遇真空伴都把塵情棄長生師父嘗走筆作瑞鷓鴣一百二十首內有云內心未驗色心魔牢捉牢擒越念多丹陽師父云牢捉牢擒生五彩與此正相好長生師父言未得真空時越把捉則越念多矣丹陽師父言己得真空則內容開要功夫把握故云牢捉牢擒生五彩長春師父要離生滅詞云既得性珠天寶勘破春花秋月此得真空之地也復云恁時節鬼難呼惟有神仙提挈前云身心百鍊次云得性珠天寶尚云惟有神仙提挈之語此非至真至實誰復肯出此言禪家以真空便為了徹故每笑此詞云既得性珠天寶矣又何復云神仙提挈邪吾謂其實未知也乾卦六龍初九潛龍勿用確乎不可拔九二見龍在田光明自見九三終日乾乾夕惕若厲始得無咎九四則親上與神明交接或上或下有時而隱有時而見故云或躍在淵躍則升上也在淵則復在下也恍恍惚惚正欲聖賢提挈至於九五始得變化無窮前必身心百鍊而後神仙提挈方能至此學道之人不先百鍊身心便欲求道豈可得邪玉陽大師曾説一道人不肯修持云我打無為顛狂自縱惹起官魔棒死當時待打無為却被無為倒打死又説見性有二真空亦有二悟徹萬有皆虛幻惟知吾之性是真此亦為見性既知即行行之至則又為見性初悟道為真空直至了處亦為真空既至真空功行又備則道氣自然一發通過道氣居身中九竅無心而自閉至此際則方是真受用一手執吾手一手晝空三橫一竪二作兀樣云無門無户四通八達是元始地面若衆生性未盡欲憑心力閉塞九竅則左閉而右發互相變亂不可制御矣此言未嘗輕泄今特發之也吾拜受之此皆人性分中事止為人不知保守故不能達此地面才有些子光明早不肯謙下自矜自滿必欲求異於人故不能成其大光明如水之將聚愈卑下則愈深人之積德亦如是實有所得愈宜深畜若或輕泄一言則有損非細又如世人千萬苦辛積聚財貨或不自愼偶非理傷觸他人事不可已一旦盡費其財其所損豈細邪故曰積之扃難保之尤難還能自保認得性分之外一切事皆是虛妄惡之如汙物真如餘食贅行方是到得自然處如未真知贅尤為醜更於頭上安頭反謂我之所有他人之所無自矜自誇終不自悟如此者欲明沂謂自然之道不亦難乎講知人者知章師曰死而不亡者壽其旨甚明玉陽大師嘗云賢人死而為鬼下愚則逐物遷化吾謂賢人者必生而有賢行是以得賢名雖至於死吾實謂之不死又云自勝者強云強行者有志修行人降心進道專以志為主志不立者至於一食非美則胸中不納是萬神不納也有志者雖每惡食不為病志既壯而萬神從之物亦隨之而變不知其味惡也人有萬神非志不能帥大志既行如大帥之行也滿身之氣皆助之何事不能克勝孟子曰志者氣之帥也吾行之甚效故愈信其為善云不失其所者久所字如子産使校人畜魚校人云得其所哉之所經中之言初欲得知知而欲為己用若泥於言而不為用則反為病然經中之言多反復不一最要人明此云強行者有志又云弱其志有云學則不是又云不學亦不是有云靜則不是復云動亦不是反復抑揚初無定義惟恐學者過與不及或著在一邊左右扶救之令立於中道學者所宜深究講執大象一章引諸家之説內蘇子由云大象即淡乎無味視聽不足見聞之大道也上執此道則天下無不往者樂餌治術也一時之善治非不能使人親附如過客之止然不可以久師曰解經人悟道本故不費辭子由為當莊子有云仁義先王之蘧廬蓋此意也志全曰五十四章注多宗政和政和多引易莊師曰三玄本一宋徽宗道性本自高故取焉吾謂知此非難行此為難吾初入道門但見老宿所行之德後觀透此經都是前人所行今日教門凡一切外事無異以樂餌而止過客甚不可住著於此當捨前人所行之道且能不失其本今日門人進修道業無世人之苦必有因地而不徒然至此求其所因實自學道上得此豈可一日忘講上德不德章終師曰經云上德不德是以有德下德不失德是以無德以教門中所行事説最為易見云暗積功行不求人知則是不自以為德既不自德是謂上德不使人知則若失其德吾謂外其德而德愈存豈不是實有其德故曰是以有德若有功行即使人知則若不失其德即為下德人知則必加敬重其德漸損故曰是以無德既將功行用在聲名上隨時失去還能用在虛無道中何者是自己實得底講道生一章云云師曰聖人之道本沒多子學人少有明得此理只為未能忘我朝暮所為凡不合於聖人者皆是自己性子直須撇了自己底自然合著聖人道生一禪家參到此際實為徹處止是此地上不能定得則别生事端邵堯夫先生有云請看風急天寒夜誰是當門定腳人吾嘗論之玄妙之言不可以示衆中下人聞之誤行者多往日有人參學性宗甚明而不持戒律無所不為達者曰此不是地獄種子邪其人曰此又何妨於道其弊乃至於此講治人事天莫若嗇章云云師曰嗇嗇愛也愛其道也此學人之日用此一字為一章之要服服食也早服食道之味重積德自損己利物以至於治人事天盡其道之用則通天徹地是故學道以積德為大本必有實德然後有所味道家謂受用學人皆能知心無雜念氣候沖和即為受用然少有得其味者以其不知重積德也不有真功德為本實無所得勞心極想雖至終年至十年乃至百年亦終無所得功德既積不求所得而自得何謂真功德曰為而不恃不自以德為德是謂真功德講為無為章云云師曰報怨以德聖人舉世人最難為者言之且報怨尚以德於其餘事上無所不用德世之人不能行此以怨報怨無有休期至於禍不能解聖人欲絶其源故特垂訓學人能明此理又何怨之能生耶講勇於敢則殺勇於不敢則活章諸家之説或利或害有云勇於不敢則利勇於敢則害是也蘇子由總解云不敢則生敢則死此物理之大常然或敢者得生或不敢者得死此或然耳世遂僥幸其或然而忽其常理以耳目觀天見其曲而不覩其全未有不疑天網之疏而多失也惟能要其終始而盡其變化然後知其恢恢廣大雖疏而不失也師曰子由之説得之孰知其故故因故也云或利或害之因故雖聖人猶且難之難之者疑之也難或作去聲更易見雖難之終無可疑也吾教説因果人或有一分之善却為有業障未除時雖未報雖經百千世業障消盡即得一分之福或有惡亦如此以其大數觀之如天網之恢恢也善惡必報無遺則是雖踈而不失也清和真人北遊語録卷之四
