  - {type: variant, offset: 4818, length: 182, content: 至於再三勸者益甚師父大笑曰俺五十年學得一箇實字未肯一旦棄去乃知至人不爲駭世之事亦如世人於財物深藏厚積雖造次顛沛未肯輕發是以至人有若無實若虚不放一毫露出甚至於佯狂混世猶恐人知之人或知之一加欽敬有損於己故稠禪師一解虎鬭遂革第三果此皆實理也奈何人必以通顯靈聖方是道殊不知必自積累功行既至深厚心自靈外縁自應無非自得若有心於求必涉虚僞其損性損福不可勝言清和眞人北遊語録卷之一, CK-KZ: ''}
