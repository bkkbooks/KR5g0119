front:
  text: 清和眞人北遊語録卷之二并八
  hash: sha256:f353ecd0b300f61891421bf5ba46ea08f10e3a1446695ec2e44839c26a329334
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0119_HFL_002-001a, image: hfl/1017/1017-080.png}
body:
  text: 弟子段志堅編中秋夜棲眞觀露坐衆話及礬山聖泉云是黄帝誕聖之地臨泉有樹帝母嘗曝藉衣於上其樹遂痀僂而俯柯葉蔭其泉似不偶然也父老云將老復有孫枝生其下既長其枝幹態度一如之至于今不知其幾代矣或曰既有如此何爲不聞有大興建以發揚之師曰吾嘗見小碣讀之乃唐時一縣宰輸己之俸以立宋得天下之後縁此地屬契丹故不復振凡大興必大廢平常乃能久物理固然耳自帝至今三千六百餘歲幾經世之興亡而聖跡儼然百世瞻仰皆由平常以致於此師父廣讀書窮理深知帝之德常稱於人人多未窮道理直以爲虚誕少有能聽信者云帝非謫降乃自降也因上天議大行以天上無可施爲願施於下土初世爲民凡有利益於世者知無不爲再世爲官僚其功以得濟衆三世爲帝遂貽萬世永賴之功故知天人必施功德於世使下民用之不竭方始復昇安居其上觀主大師張公問曰傳聞帝之先有五紀焉咸有聖德民壽萬歳可信然否師曰以無書傳可考則似誕妄以理推之則爲信然人初禀道氣以生亦必隨道氣之盛衰當其天地始判道氣精純所生之人性如赤子皆服其氣而壽數豈止於萬道氣漸離地産靈芝當時人皆食之猶得千歲及乎道氣已散而生百穀人擇其精者食之美滋味而嗜欲生焉壽不滿百不亦宜乎以理言之亦不可謂誣也吾少時讀佛氏蓮華經如云日之大若干月之大若干天有九霄地有九壘各高厚若干初讀之直以爲誕妄後因入道乃得其理謂如九霄即虛無也虚以實爲對則地有九壘亦固然爾如地産金銀銅鐵之類人見其金銀銅鐵也是乃五行之氣在乎内而秀發於外而成形質是自無而入於有雖曰堅剛然久則必還其初昔有客嘗論及時尚以金飾衣段計日所費不下數百鋌不意堅金亦復有壞邪吾是以知世人不知天道如此天道必還非有心於還而自還之此即理也金出於地亦何嘗欲於世用人以機巧取之不厭則有傷於元氣今者形質雖壞而其氣則復於初如或不然則生生道息矣生生之理不獨於金水火土木之屬凡物皆然也吾從師父過隂山之北沙漠有大林雖無斧斤之伐不以大小而舉林自朽蓋所禀根氣既衰不得不朽耳然則其孫枝又復生其下此即生生之道也以此觀之榮枯生死莫非自然人生富貴貧賤榮枯壽夭亦各有所命也惟人不受其命則苦心勞形貪求不已然則終不能於定分上曾有一毫增益若或用心失正積成罪業其所損有不可思議者非徒無益而又害之故曰無心是道夫世道衰微民不能明達此理故天生大聖大賢以拯救之以言教以身化發明三理將使復其常性祖師設教正爲此耳師曰凡人無故遭人欺罔困辱或至殺害莫非還宿債也惟達人明理故不敢欺一念不敢凌一物一言一動惟恐有負於物寧人負己終不以己負人欺人則自欺害人則自害如以刃自傷其身師與衆坐論及世之人多剥於下而奉其上以安其身師曰何惑之甚也取於衆而安其衆身不求安而自安若惟求安身而不恤於衆則是反危其身是不明損益之道也故云損之而益益之而損此非世俗所能知中秋十七夜棲眞觀合衆露坐塑師王才作禮求爲道像法師曰凡百像中獨道像難爲不惟塑之難而論之亦難則必先知教法中禮儀及通相術始可與言道像矣希夷大道視之不見聽之不聞聲色在乎前非實不聞不見特不盡馳於外而内有所存焉耳而謂實不見聞則死物也如内無所存而盡馳於外則是物引之而己道家之像要見視聽於外而存内觀之意此所以爲難世間雖大富貴人其像亦甚易見謂如富有之人則多氣酣肉重頤頷豐滿然而近乎重濁道像則不失其風骨清竒而有大貴人之氣見於眉目之上天庭日月之角又背若萬斛之舟喻其重厚也必先知此大略其爲像庶幾矣雖然但當有其意甚不欲圭角呈露此所以爲尤難世之富貴雖大至於帝王猶於術之中可求惟道像則要於術外求之術說外相則窮到妙極處至於内相則術不能盡然有諸内則必形諸外而可見於行事事跡也所以行事者理也尋其事而理可知故知内外可通爲一惟道家貴在愼宻不出故人終不可得見如列子居鄭圃四十年而人莫識之祖師以次諸師眞以其開闢教門是故處處在在開發祕宻明談玄妙師父嘗云古人悟而不遇今人遇而不悟古之人有志行高遠抱樸含眞不遇至人明指而終其身者不爲不多今人幸遇至人大開教門尚有終不可悟者悲夫古人云千載一聖人出五百年一賢人出言聖賢間出也誰謂祖師以次諸得道師眞並見於世今日師眞雖不可見其所貽教言具存人但以言辭俚直謾不加意殊不知辭近而㫖遠也文人以文章規矩校之則不無短長蓋至人志在明道而於文章規矩有所不恤長生師父雖不讀書其所作文辭自肺腹中流出如瑞鷓鴣一百二十首風入松六十首皆口占而成又注三教經筆不停綴文不足而理有餘知者以爲脫神仙模範云雖不讀其文而盡得其理理者道也凡才士之於文章百工之於技妙處皆出於道但終日行而不自知爾凡物無不自虛而生因指其殿宇曰只如此殿宇塑畫自人性中幻出人性自道中幻出其妙用豈非道邪天地雖大萬物雖多亦自虚而生太極生兩儀兩儀生四象四象生八卦相推相盪變化無窮經云道生一一生二二生三三生萬物復云夫物芸芸各復歸其根歸根曰靜靜曰復命此道妙之極也人生於道而能復於道是不失其常性矣聖賢有千經萬論何嘗云飛騰變化白日昇天止欲人人不失其常性生死去來分明由己若不能處身應物則失之矣一失則千差萬别雖六道四生無不爲者太古得道之後嘗問於衆曰教言中何者最切於道或對以不來不去太古笑曰此教法也來去分明即是也師父在膠西時亦嘗以此問衆山翁以自心所得對師說後到沙漠又以此問衆吾對以應念隨時到了無障礙自有根源師父亦許之人誰無念要知念之邪正所欲去者邪念耳凡損於精損於神與氣者皆邪也學人不知此多執絶念爲是如依理作用累功積行之正念亦將絶乎絶之則又死物也豈可通於道正如人坐環堵不敢交一物不敢動一念而欲守待其道不識其道果可守待邪果不可守待邪吾將以天地爲環堵逍遥盤礴於其間而與物相周旋綽綽然自有餘地未覺有妨於道也有云誰無念誰無生若實無生無不生又有云雲去雲來天自靜花開花謝樹常閑又指其月曰此物但不爲青霄之下浮雲障蔽則虚明洞徹無物不照人皆見之矣殊不知人人有此心月但爲浮雲所蔽則失其明凡私情邪念即浮雲也人能常使邪念不生則心月如天月之明與天地相終始而不復昧矣師曰前輩修行塵塵刹刹體究念慮覺一念惡則必自陳說於人使自辱自恥冀不復生於心今之學者反是有一小善則自矜自揚惟恐人之不知千惡萬惡自隱自恕惟恐人知之或知是終不能爲善也師閒居門弟子侍側師使坐相爲揖讓久而不定師曰禮義亦貴眞率己無勝心而偶居人上何傷閒居則不必多讓多讓則近僞然禮以敬爲主若不以義裁之則不可行居己以敬臨事以義君子也敬常也義變也知常而不知變是執一也執一則不通矣天之四時温凉寒暑風雨雷霆變也有感則變雖鬼神不能測人之於事亦如此不獨於禮凡一舉一動不可造次隨機應事要合其宜爾等無以此爲末事而不盡心道不外乎此矣昔丹陽師父初立教法以去奢從儉與世相反爲大常凡世所欲者舉皆不爲只緣人多生愛欲不休以至迷却眞性而不能復故有道伴不過三人茅屋不過三間之戒至於建祖堂亦止三間其基址頗高爽門人請一登臨竟莫許且曰吾於此未嘗施工況登臨乃人之所欲修眞之士不爲經云如春登臺言暢情也下觀春物熙熙心意暢然意暢則情出景與情會則流入愛境而恐漸不知反兼遊勝地實消人之福嘗記師父初入長春宫登寳玄堂見棟宇華麗陳設一新立視良久乃出衆邀之坐不許此無他亦恐消其福也時有一人知其不可故作意邀我坐吾即從之坐夫事有不可已者己初無心以爲而人以巧意搆令爲之己姑從之又何害我初無心故也若藏機心外雖不從人爲亦安得無罪也師曰祖師在崑崙山日長春師父從之已三年時年二十三祖師以丹陽師父宿世功行至大常與談論玄妙以長春師父功行未至令作塵勞不容少息一日祖師閉户與丹陽論調息法師父竊聽於外少間推户入即止其論師父内思之調息爲妙則吾之塵勞事與此正相反自此之後有暇則力行所聞之法後祖師將有歸期三年中於四師極加鍛鍊一日之工如徃者百千日錯行倒施動作無有是處至於一出言一舉足未嘗不受訶責師父默自念曰從師以來不知何者是道凡所教者皆不干事有疑欲問之憚祖師之嚴欲因循行之而求道心切意不能定憤悱之極一日乘間進問祖師答曰性上有再無所言師父亦不敢復問後祖師臨歸正臘月中四師乞到錢物令多買薪炭大燃於所寢之室室甚小令丹陽長眞立於内而不任其熱令長生長春立於外而不任其寒内不敢出外不敢入如此者久長生師父不堪其苦乃遁去至正月四日祖師臨昇三師立牀下祖師曰丹陽已得道長眞已知道吾無慮矣長生長春則猶未也長春所學當一聽丹陽命長眞當管領長生又謂長春曰爾有一大罪須當除去徃日嘗有念云凡所教我者皆不干事爾曾不知不干事處便是道師父親說此言吾初聞之甚若無味悟之則爲至言凡世間干事處無非愛境惟不干事處是道也惟人不能出此愛境故多陷入惡地蓋世間之事善惡相半既有一隂一陽則不得不然耳惟在人之所擇也習善不變則惡境漸疏將至於純善之地惡念不復能生習惡不悛則惡境易熟善念亦不能生矣棲眞觀醮罷師黙坐久衆起拜請教師曰衆等無以吾爲隱吾所以不言者以其無承受之人言之不聽聽之不行彼此無益吾何以言爲吾昔在濱州時偶中風疾内嘗自念曰此生幸遇師眞所得玄微之㫖皆口傳心受誓將傳於後人儻因此疾以終甚不副師眞所傳之意況今日嗣掌教門而復有隱邪祖師以來教門如許今四方之人所以有信於我者以其曾親奉至眞必有所受耳至眞之道吾豈不欲言嘗記從師父濰州遭難北行當時檀信甚衆從之半月餘願聞一言終不可得一日蕭老先生以達師父乞少應衆意師父曰何嘗無應邪吾譬如一鐘隨扣隨應若有扣之大者雖聲滿天地無難此吾所親聞也吾生於大定九年十年祖師昇是以不得親奉以次師眞皆所親奉太古師特爲我說易皆世所未聞玉陽師握吾手談道妙長春師父所授不可具述吾今年幾七旬歸期將至豈欲不付後人凡吾言皆本於實人多好異故聽之者不入陳秀玉於師父則貼然心服嘗謂人曰吾所以心服丘長春者以其實而己嘗與論教有云道釋雜用權惟儒家不用非深明理者不能有此語蓋道釋之教方便以化人爲中人以下設此聖人之權也孔子有云中人以上可以語上也中人以下不可以語上也是以聖人曲垂方便循循然誘之而使易入至乎善則一也故聖人之心豈有異哉皆期於善而已吾今以實言告諸衆衆等聽之非我之私言也師眞之言也人之學道奉善初心莫不精進行之未久而退怠以其妄有所求卒不見其驗則疑惑不能自解故中道而廢聖人設教於天下後世惟欲人去妄復性而不使情欲亂於中使其心得其平常爲入道之本聖人豈獨無情哉能自不動其心耳如天有四時寒暑運用雷霆風雨萬變於前而太虛之眞體未嘗動學人體究至此是到平常地也故有云平常是道先保此平常其積行累功皆由乎己是在我者也道之顯驗聖賢把握是在天者也當盡其在我者而任其在天者功行既至道乃自得若有心以求則妄矣昔從師父到獻州一縣令從師父左右未嘗輒離一日乘間有問云某潜心在道己靜居十五年人皆謂之清靜然自知其未也師父笑不答既久曰清靜非一有内有外有無爲有有爲公之所行外也有爲也一男一女世事之常如公之行亦未易得然則非眞清靜也無爲自得是謂眞清靜聖賢與之也今之學人或有存想吐納以爲事者善則善矣終不見其成功正如入於冬時能開諸花卉於覆隂中非不竒也然終不能成其實惟無爲清靜是爲至極無漏爲驗也三年不漏則下丹結六年則中丹結其事己有不可具言者九年上丹結轉入泥丸三宫升降變化無窮雖千百億化身亦自此出何以能致此曰必心地平常以爲本心平則神定神定則精凝精凝則氣和睟然見於面發於四肢無非自然蓋初以心地平常爲本故也此在乎己者固不可不盡係乎天者不可以强致惟其積累功行既至則有所自得長生師父屢言今之教門中至誠進道之人皆宿世遭逢正陽純陽眞人曾結重縁今人要知此理積德不休則其超進未可量也亦如朝廷百官各分品秩其黜陟進退必驗其功過既爲修行人便出於常人一等如九品之官若有功無過升進不已則極品可期也學人昧於此而不務實功直欲享極品之貴天下豈有此理邪觀諸師眞得道等級不同皆由所積功行有淺深丹陽師父纔二年半得道長眞五年長生七年長春師父在磻溪龍門近二十年志氣通徹天地動達聖賢以道見許後則消息杳然師父下志益堅纔得之未久復奪去只緣功行未全也師眞且如此況餘人乎學者惟當修進功行無求顯驗莫起疑心行之既至自然有所開覺凡天資穎悟迥出尋常者非一生一世之故其所積累者必有漸矣吾生三歲其見聞之事耿耿不忘於懷五歲入學不出冬三月能記孝經論語二經雖使日記千餘言猶有餘力先祖通隂陽之學吾求學之祖不許曰一日中能記花甲子而後可吾堅請過午授之比日没已能通誦吾家本滄州大族宋時游宦東萊因而家焉一母三生九子皆讀書登進士第仕至刺吏者蓋七人而今碑刻具存及大定間家法尚有未墜者子生三歲皆預拜墳之列吾方五歲是歲寒食僅百人須日未出禮畢既散歸宴樂遊嬉各從所欲吾獨有所感私念祖先悠悠不知所徃人之有死亦自不知所歸心思惘然坐于大桑之下仰觀俯察天地之所以立萬物之所以生此天之上地之下又有何物爲之覆載何物爲之維持思察之極以至於無思而不知天地之大萬物之多但見水氣茫茫通連上下如卵殻之狀㝠然漠然不覺心形俱喪家人訪見之始呼起則日已暮矣吾初亦不知其所以然後入道遇師眞悟此忘心之趣七歲遇關西王大師一語相契十四遇丹陽師父出家父嚴不許至十九復驅入俗中鎖於家嘗黙禱於北辰之下每至千拜一日武官者劉先生與客談道於中門之外吾潜心跪聽沙石隱入膝中不自覺後竟逃出復驅入反復者三始得出離於俗曩雖在俗中亦不知俗中之事初昌邑縣西住庵嘗獨坐一桃樹下每過半夜有時不知天曉一夕四更中忽一人來道骨仙風非塵世人金光玉澤瑩然相照吾一見之正心不動知是長生眞人也既至揮刀以斷吾首吾心亦不動師喜復安之覺則心有悟知師易吾之俗頭面也後十日復至剖出吾心又知去吾之俗心也又十日復至持油餻一盤餉予盡食之過飽欲死師即剖吾腹盡去之蓋以吾性素自高高則多所損折故去其所損者嗚呼至誠感神信不虚矣若能盡心行道聖賢相去不遠此事未嘗語人今乃大白於衆衆等勿爲空言忽而不行也建州開元觀夜話衆論及人事興廢師曰觀天之道執天之行盡矣惟人不能觀察天道之微又安得執而行之邪天道至神試舉其一二如云百刻成日但緫言之耳然其實不滿百數又十干配以十二時相推相盪變化無窮若日滿百刻時干同數則定于一而無所變惟其能變是以生生萬有而不窮凡一物一植雖由一氣之化成有盛有衰皆係乎時運且如五穀以至於百草其種類不可勝數若一種得歲之宜其生氣倍盛於餘種時運使然也故云萬化隨時出物之無情尚爾況人通天地之靈者也物理有盛衰則人事亦不無興廢上自國家至於各門異户無不然者如西方之教入中國逾千年非因其時何以致此惟因時而出亦必因時而廢雖事物興廢皆係乎天而天之眞常未嘗少變何哉無心故也人不能知此理則憂喜妄作逐物而遷至失其正而不能復是以達人無心任萬變於前而不動以其知吾之性本出於天與天同體故所行皆法於天學人能至此則始可與入道矣川州玉虛觀道衆檀信奉師終日勤勤夜久未忍去師曰長春眞人詩云白髮蒼顔未了仙遊山翫水且留連不嫌天上多官府只恐人間有俗緣俗緣深重害道爲多人情貴華與道相反此殷勤眷戀即屬愛情有愛則有惡以至喜怒哀樂莫非情也若不能出得情又安得入道父子之愛可謂重矣而達人亦不以爲累如列子載東門吴是也云其子死而不憂人問其故云云吾向日與無子同今雖死故不憂惟其無親是謂至親視天下之老皆吾之老天下之幼皆吾之幼物皆吾屬同仁一視非至親邪故莊子有云至仁無親若親其所親則有所不親愛其所愛則有所不愛矣此世俗之情耳爲道之士要當反此凡世之所愛吾不爲甚愛世之所惡吾不爲甚惡雖有喜怒哀樂之情發而能中其節而不傷吾中和之氣故心得其平常平常則了心矣有云佛性元無悟衆生本不迷平常用心處只此是菩提道本無爲惟其了心而已治其心得至於平常則其道自生譬如治田除瓦礫剪荆棘去其害苗者依時如法布種於中不求於苗而苗自生矣故曰道本無爲惟其了心而已又有云了心一法萬行皆備豈不見諸師眞親授教於祖師然猶千磨百鍊以制其心只緣其性雖出於道一投於形質之中則爲情欲所累蓋形質乃父母所遺稟隂陽之氣以成有動有靜理也縱復一念善生則爲形氣所驅而不果行是以有志之士知心性本出乎道而不使形氣奪其志久則克之氣形俱化而渾然復其天性此皆由平心以致之心平則神定神定則氣知道自生矣故曰形神俱妙與道合眞苟不去其情累以平其心則徒苦其形骸而能入於道者未之有也上根生而知不爲情欲累其心下根近愚而不及情情惟在於中人若存若亡可上可下習善則爲上習惡則爲下善惡之分豈止雲泥孔子曰性相近也習相遠也是故人不可以不知學吾謂十經萬法特爲中人設教法者教其所未知也學者學其所未覺也既知所未知覺其未覺則欲其行也行之既至心與法同則雖無法可也法如藥餌也病既痊矣勿藥可也學其未覺惠也功也弘揚教法接物利生行也積功累行爲道基本絶學遺法乃可入於道故曰絶學無憂無憂則乃見眞空不言而道自行矣如天道運用而四時自行百物自生夫何爲哉義州朝元觀會衆夜話話及教門法度更變不一事師曰易有云隨時之義大矣哉謂人之動靜必當隨時之宜如或不然則未有不失其正者丹陽師父以無爲主教長生眞人無爲有爲相半至長春師父有爲十之九無爲雖有其一猶存而勿用焉道同時異也如丹陽師父十勸有云茅屋不過三間在今日則恐不可若執而行之未見其有得譬如種粟於冬時雖功用累倍終不能有成今日之教雖大行有爲豈盡絶其無爲惟不當其時則存而勿用耳且此時十月也不可以種粟人所共知非粟不可時不可也然於春則可種此理又豈可不知吾始學道悟萬有皆虛幻損之又損以至於無爲後親奉師眞訓教究及造化之理乃知時用之大也嘗記玉陽大師握吾手而言曰七朵金蓮結子今日萬朵玉蓮芳然皆狂花也故知道本自然然必自有爲行之而後可得積行累功進進不已外功既就不求得而自得之有云赫赤金丹一日成學人執此言謂眞有一日可成之理則悮矣本所謂功行既至天與之道頓然有悟於心故曰一日成也若果有不待功行一日可成之理則人人得師眞一言皆可入於道而祖師暨諸師眞又何必區區設教化人修行勤苦如此永嘉有云無明實性即佛性幻化空身即法身所謂瞬目揚眉運臂使指者是也是即是矣如何亦有入地獄者必將無明幻化鍛鍊無餘然後性命自得合而爲一故知必自有爲入也無爲有爲本非二道但顧其時之所用如何爾孔子謂顔淵曰用之則行捨之則藏用捨者時也行藏者隨時之義也若不達此則進退皆失其正何道之可明何事之可濟信乎隨時之義大矣國家並用文武未始闕其一治則文爲用亂則武爲用變應隨時互爲體用其道則一也教門之時用何獨異於此此吾聞於長春師父師父之心至謙至下大慈大悲所出之言未嘗一毫過於實常云無爲之道視之不可見聽之不可聞行之卒不可至長生與俺尚多疑心中道幾乎變易故知後人未易行都不若積累功行最爲有效必有志於功行莫如接待凡所過者飢得食勞得息時寒時暑皆得其安慰德施於人者有如此而功可不謂之至大乎久而不易其誠則當有神明報應縱或未至則必有外助其暗中顯應有不可具言者吾所親經未嘗言於人凡人有功一分即說一分猶且本分或說作二分則前功盡廢默而不言其功得倍故有云不求人知惟望天察經云建德若偷己有善行人或反非之能不與之辯則其功亦可得倍若或辯之斯不善已縱復辯得是又有何益大凡修行人無一時不與神明交又何顧人之知與不知經云善者不辯學者當明此理通仙觀方丈夜久趙志完歌師父夢游仙詞既闋衆起拜請解其義師曰丹陽師父未出家時性豪縱好飲然己學行功法乃知性中自有道之根源初見祖師即知非常人問曰如何是道祖師曰五行不到處父母未生時至哉此言吾少日粗學隂陽故知人皆不出隂陽且此生所受五常之性即前生所好既習以成則有以感之也謂如前生好仁今生必得其木相好禮必得火相好義好智必得金水相之類所好不一則必得五行不純駁雜之相此之謂習性感化又謂之因果今之福業貴賤皆不出五行因果也本來之性有何習無習有何感無感無習是五行不到之處父母未生之時也學人既知今之所愛是多生所習便當盡除去當從最深重處除取去漸至諸習淨盡心形兩忘恍然入於仙界故此詞首云夢游仙人心上舉一妄念即是迷雲必須除去乃得清明故有云灝氣清凝素雲縹緲貫無邊莊子云至人之息以踵衆人之息以喉學人無實功夫者中丹田且不能到豈能漸漸入深得至於踵師父云至人豈止以踵上下一段光明也故有云大光明罩紫金蓮金蓮心也學人儻遇惡境莫令心上少有變動如禪家道假若鐵輪頂上旋定慧圓明終不失故云皆禀道德威權神通自在劫力未能遷重加鍛鍊使習性如綿之柔進道之志如金石之堅常在萬物之上不令一物染著學人當以道德爲根源外事雖有萬變皆是虛動然隨而應之吾之湛然眞體未嘗動也如以黄金鑄諸器物然形狀有萬不同而金之眞體未嘗變也故云應念隨時到了無障礙自有根源若人心上未有所見不能知此詞㫖趣即當積功累行功行既至明有響應學道之人未至洞達神明不能見道此眞實之語衆等識之清和眞人北遊語録卷之二
