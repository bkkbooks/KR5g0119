front:
  text: 清和眞人北遊語録卷之三并九
  hash: sha256:d77b8098811c2ca6b449539b765d1b8fab2b642553b2fc7ebff3699414f704a3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0119_SJB_003-330168b, image: sjb/33/330168b.png}
body:
  text: 弟子段志堅編癸巳冬十月義州通仙觀命郭志全講道德經首章有云玄之又玄志全云無極之妙也師曰大凡書中重稱之辭皆不盡意此非論語時哉時哉之類也以明天中復有天之妙理夫人稟元氣以生性中各具一天若人人能自通明而所行盡合其道則雖無經教可也蓋縁衆人爲物欲所引迷不能復是故聖人重哀之設此教法以開覺拯救之學者當因其經而究其用貴在躬行行之既熟從容中道尚何待爲學未至此地欲棄學亦不可也故有云人禀元氣以生得其清者爲賢濁者爲愚此特明其大槩曾不及其用信如此言則賢止於賢愚止於愚是絶爲學之路吾聞師父嘗言道氣化生天地長養萬物其中把握有至聖存焉得其大者爲聖賢小者爲常人飛潜蠧動之屬止得其偏者耳此至明之理雖萬類不同其出於道則一也既出於道而皆具道性況人爲物靈則有可復於道之理只绿多生迷於所習失其常性不能自反今者因經教明此至理便合言下領受將積習迷情一皆除去不求於道而道自得隂符經三章其一神仙抱一無爲自然也其二富國安民積行累功也其三强兵戰勝物欲染習害吾正性兩者交戰能以道勝之非有志者不能經云强行者有志又云自勝者强凡己之愛惡一能反過苦於己利於物自損自卑任物欺凌而不勸此自勝之道也初則强行久則純熟漸至自然物欲淨盡一性空虚此禪家謂之空寂吾教謂之清靜此猶未也至寂無所寂之地則近矣雖然至此若無眞實功行不能造化無造化則不得入於眞道須入眞道則方見性中之天是爲玄之又玄至此則言辭舉動凡所出者無非玄妙故繼之曰衆妙之門講天下皆知章剖析六對至聖人處無爲之事云此非有爲對待之無爲乃無爲無所不爲之無爲也故以堯讓許由之事證之云以迹觀之則堯有爲而許無爲以道論之則堯未嘗不無爲許未嘗不有爲也堯雖居天下之大如寄如託而不有其天下故雖天下之大而不能累其心其讓非無爲何許之辭曰子治天下天下既已治也吾不爲名名者實之賔遂不受且天下既已治則故不受或當天下之未治則許將若之何亦必有所爲也堯許同道易地則皆然故曰堯未嘗不無爲許亦未嘗不有爲也惟其應變隨時處之合道初無心於其間是以並稱聖人師曰學道之賔主不可不明也學道是主萬緣皆賔凡與緣接待輕重塵勞一切功行皆是求道之資無有不可爲者惟不可有所著一有所著則失其正矣今之積累功行人甚多然少有功成不居爲而不恃者既有恃著止是有爲福德若爲一切功行無恃著之心則受虚無之功獲自然之福雖曰有爲吾必謂之無爲矣凡一切功行塵勞實爲求學之資非爲功名也正似農人竭力耕稼及百工日用其技其心主於謀食而耕稼及所爲之技皆是賔也要終日經營而無著於經營雖聖人豈無經營獨不主於經營耳故有云聖人有經營之跡無經營之心凡所經營者皆跡也一著於跡則便有對待能不著一物透入虚空方可出於對待吾嘗有云踏破虚空離六對又永嘉云諸行無常一切空此是如來大圓覺修行人體至於此則入未始有物之地神師云五行不到處父母未生時盡矣講不尚賢章終云云師曰此章之義道德已過半矣學人必先通異名異象而後看諸經文則少惑如龍虎嬰姹等語不出元氣隂陽如釋氏曰教又曰禫名殊而理一也還能心上轉换過則無不爲己所用此章首言治國之道又何異於治身心即君主百體皆臣庶也君治則國治心治則百體自理嘗記師父大定間宣見時論及諸功法惟存想下丹田爲最然止一法耳於道則未也近年隰州王道人以此爲至極以授諸人曾不知有爲之僞法終不可入於眞道吾嘗言如以術能開諸花卉於寒冬之時然終不能結其實嘗來叅問吾以眞實告之出而有言曰言性不及命此是何言邪一物不累清虚其心十二時中皆是福德不求腹實而腹自實也損之又損一念不生其志弱矣志弱則骨强亦莫非自然之道也此外又復有所謂命者則吾不知也大凡學人初莫不有志於道然多中道而廢止緣有求速成之心卒未見其驗則疑心生此所以廢學人心上未了正如人抱大疾必求諸醫服行所授之法或久未驗則必求他醫行之又無驗則疑心生至於再三則雖復有名醫之言亦不信也終不肯回顧自己緣命如何耳凡得道之人人但見其今世得道殊未知其五世十世至於百世所積修功行既大成於此一世也豈不見諸師眞未出家時皆已有心地玉陽大師嘗言太古師二十八歲山東賣卜一日偶書一詩其語意非得道人莫能及後遇祖師入道便言爲道不難沃州橋下四十日了道非有宿積之功能至此乎吾住玉清觀境中見天門開吾嘗以問師父師父曰此猶未也比之了道如此妙境不可具言道氣内充恍恍惚惚正如乾卦九四或躍在淵之理深信大光明罩紫金蓮也吾初不知後入道乃知人人具足此理丹陽師父初開教門止言道之易成門人敬信其言或三數年不見其驗一日衆集上問曰師言爲道之易弟子等嘗觀得道人皆是宿緣所致非一世所能成師嗔目大喝曰既知如何不下手速修衆皆退服其言今日爾等但勿有疑心休虧日用遇有惡境莫使心動一回忍是一回臝愼勿因循苟且積成罪根定有墮落吾言不妄矣會集諸家之解講谷神不死章終衆請師指證師曰諸家之說各有理然河上公神人也故其注於性命則詳於外事則略却如諸家罕言治内之事也修行人聽受得用最多者莫如河上公夫谷神不死一章爲道用之極致而初學者便欲爲用則失之矣吾謂必先行盡前五章之義始可用此谷神之道是故爲第六章嘗記師父濰州時遊息於花園草亭吾與趙虚靜先生老蕭先生及龍虎千户侍師嘗授此章之大義云俺於大定間入見時進詞畢承㫖求道俺心許傳谷神一章以萬乘之君懇心求道況乃實有德行亦足以傳然必能持戒七日而後可曰不能減至五日又曰不能又減至三日近侍猶以爲難遂止俺與丹陽同遇祖師學道令俺重作塵勞不容少息與丹陽黙談玄妙一日閉其户俺竊聽之正傳谷神不死調息之法久之推户入即止其說俺自此後塵勞事畢力行所聞之法行之雖至然丹陽二年半了道俺千萬苦辛十八九年猶未有驗祖師所傳之道一也何爲有等級如此只縁各人所積功行有淺深是以得道有遲速丹陽非一世修行至此世功行已備用此谷神之道當其時耳故速見其驗俺之功行未備縱行其法久而無驗固其宜也修行人必先全抛世事齊修萬行使一物不累一心致虚至寂無所寂之地功行兼備則福至福至則心開一點光明透入即天地之根二物自然合而爲一方用綿綿之道以存養之使之充實則永劫不死矣故張平叔有云鼎内若無眞種子猶將水火煑空鐺入道自有等級皆驗福德清靜以進升今之人或不務實功實行以成其福而徒勞空想要入眞道未有不落空者哀哉昔日山東堂下有一客來叅問本西路富商有遇正陽眞人傳授微訣即日盡棄其財世欲淡然自忘於心師父惟教之積福愼勿馳騁於外外人既知則必加尊重久而有所損折難以成道是知雖遇眞傳亦須重積功行以資其福方有所成也弟子問經中出生入死之義師曰河上公注可取十有三者蓋言十之有三四體九竅或匕情六慾是也出之則生之道入之則死之道惟人以生生之厚則動而之死地故善之生者使無死地雖虎兕甲兵俱不能爲害凡人既有所積惡業則便有死地自有惡氣隨之故遭惡對皆是還報宿債也人無惡債與人交則自然得和和亦非一有面和有神和顔色相和而無惡者面和也然猶有離間神和者面未熟而神先和則無間矣此無他素無惡積故也永嘉有云了則業障本來空未了應須還宿債善惡皆有還報且如我以和悦之色奉人則人亦以和悦答我我以暴慢之色加彼則彼亦必以暴慢復我矣自然之道也小逆小順尚必還報果有損人害物之惡豈得無報必欲無報莫如無業業從身出有身則有業七情六慾内外交攻盡心制御尚有不能若或縱之動成其咎玉陽大師有言最切云欲要修行駡假軀蓋言使人業根不絶而有死地者皆爲此假軀也能斷諸業根使無其死地者惟丹陽師父一人而己若有一分之業未盡則猶有一分之報嘗謂萬法皆通一理且隂陽家推人之命謂如大率以十分内有三分犯惡星曜者而其性果有三分之惡夫何故以其前生習性中有三分之惡未盡其惡星蓋自感也然遇物即有三分之惡爲對有十分則十分爲對各隨已有之分數或遭惡人遇惡事之類是也如影逐形如響應聲處處在在無有可離之理昧者不自知察或遇人無故與己爲惡即欲忿去其人殊不知外惡未去己惡轉生比之元惡又不知加幾倍此所以人多習至全惡而終不自省不如將己之惡去盡則是無對外惡何從而生修行人止是自治或獨居或與百千人居亦止自治而已既明此理即要人當下承當不然則來生又如是何哉蓋習性中帶着種子故耳是謂種性或問曰師嘗言人稟五行之性皆習性所感化亦此理邪師曰然還能捩過此來便是提挈天地把握隂陽五行不到處也故師父有云裂碎中間一點便超得岸神舟凡人心上物物無礙方是圓成若有一物過不得則猶未也師父初學道下志裂心縱有難裂之習不過百日未有不淨盡者自言俺無懼於猛虎見神刹埿像而有懼心時時故徃見之或就宿其廟如此者三年懼心方盡故知人心上應有難過底事無非客情以志裂之未有不能克勝者惟患無志講至載營魄章終請師指證師曰老莊之書言不盡意非得道人難以知其微禪語如謎令人難解亦非故爲如此其理有不容名言處是以不得不耳志全曰禪家近似老莊之言師曰禪家專明宗性其妙處不出老莊之所云故假其言以傳其妙非其言則無以拈弄其語言三昧人人游戲若非得道之士未有能忘之者又得道之人豈一一皆自經教中來未有經教時豈無得道之士玉陽大師得道後方看道德經然欲講演則必假於言此載營魄一章如引握人手教之修行之事嘗記病王先生學道立志苦卓忘形忘世食不暇擇但充腸而己如此者四年所行甚合此章之義愚一日靜中覺氣候沖溢頂上作一聲其頂開裂而甘液沛降自此後殊無消息遂生疑心就師父堂下叅問凡住者有問疑心未嘗不受師父嗔喝意謂學道復有何疑師父素知此人之誠故容叅問師曰豈不見道德經所云天門開闔乎此後師父時時問及知其再無消息即令住觀院接待積功行是知雖有苦修而無功行終不能成玉陽大師自居家時不知慾事出家不漏後在鐵楂山忽一夕有漏哭泣至慟意欲食之感諸天以布沖和之氣後三日乃得心地此後方是千磨百鍊曾於沙石中跪而不起其膝磨爛至骨山多礪石荆棘赤脚徃來於其中故世號鐵脚云如此三年舊業始消盡學道之人要明此箇道理或問曰有人多積功行而不能成大福者何曰只縁逐旋受用却正如人積財隨得隨使終不能至大富矣師曰玉陽大師見吾觀馬歎曰馬曾做人人亦曾作馬俺第二十七劫曾爲牛故今生之性猶昏而不識文字牛母嘗來求拔薦於我佛教云得道人能超三世父母俺謂能超億曾萬祖師曰長生師父預言未兆之事甚多未易一一舉似如呼老冀先生來堂下不數日化去朱二官人亦無故召至七日化冀公人號冀山岡爲其家以隂陽二宅爲業棄妻子出家有大志住神山十五年不復窺其門長生師父問人曰萊州誰氏爲極富人以其極富者對師曰俱不富於冀山岡先生此公已得清靜果雖滿地金玉如何買得此非極富者乎朱二官人心地雖未至此其功行甚大講至寵辱若驚章終師曰就教門下直說衆人易知一言可斷之曰戒著假既知身是假則不可著著則喪我之眞故無其身非棄其身也但不有其身耳身且不有況天下乎聖人亦不是棄天下但如寄如託而不有其天下所謂寵辱等事吾何爲驚郭志全曰列子鄭人得鹿一章其大義以謂人不知道則於得失之際無非謬妄故實獲鹿者妄疑於夢而失之或者用彼疑妄之言而得之彼與彼將自以爲眞得失也殊未知所得所失俱非其正是故士師而令中分之故知儻來之得失皆猶夢幻又何以妄爲寵辱若驚邪師曰人多不識得夢祖師有云夢中識破夢中身便是逍遥達彼岸頭人夢有根念爲之根念有眞假夢亦如之如影附形也不止夜夢爲夢念念皆夢也何者爲眞假惟不傷道德神氣者爲眞此外莫非假與妄也雖聖人亦豈無念然應萬念曾不失其眞眞爲根源故也師父有云應念隨時到了無障礙自有根源夫知道之士或毁或譽或寵或辱千變萬化曾不動心何哉只縁識破此夢幻也有云夢裏明明有六趣覺後空空無大千列子所謂鄭人得鹿只縁妄境上得只於妄境上失此說無他止是戒有心也師曰穀之始生自吐芽布葉以至出秀皆得名爲穀然必結成子粒乃得穀之實收而貯之變而爲食能復爲種是得穀之用也然則有苗而不秀者有秀而不實者或捨之不耘則不成實或揠而助長則反爲害皆失其道也惟當時種時耘待其天成而己學人自初地以至得道節次地面皆可名爲道然必得入於眞道始得道之實或有退怠者自止太急者反害間有無此太過不及之病而育所得者猶未至實地或不能藏宻待時自矜自揚爲師爲範些小光明散去不復再得終所成苗而不秀秀而不實此之謂也講至視之不見章終師曰通得此章之義正是自家教門行事丹陽師父全行無爲古道也至長春師父惟教人積功行存無爲而行有爲是執古道爲紀綱以御今之所有也經曰能知古始是謂道紀凡學人先執持己之道性爲紀綱而後積累功行以應諸緣無施不可丹陽師父云無爲心内慈心起眞行功緫屬伊功行既到心地自得開悟聖賢與之道奈何有功之人多懷倚賴功行望道之心還能將此心忘却便是爲而不恃師父嘗云俺今日些小道氣非是無爲靜坐上得是大起塵勞作福上聖賢付與得道之人皆是功行到聖賢自然與之丹陽師父因乞飯中聞道長眞師父路中行次得之長生師父坐於洛陽瓦市中至七年得之清和眞人北遊語録卷之三
